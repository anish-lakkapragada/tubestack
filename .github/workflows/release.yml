name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
      tag-name: ${{ steps.version.outputs.tag_name }}
      release-name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          RELEASE_NAME="tubestack v${VERSION} build ${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag_name }}',
              target_commitish: context.sha,
              name: '${{ steps.version.outputs.release_name }}',
              body: 'Automated TubeStack desktop build from `${{ github.sha }}`.',
              draft: false,
              prerelease: false
            });
            core.setOutput('release_id', release.data.id);

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-apple-silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            asset-name: macos-arm64
          - label: macos-intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            asset-name: macos-x64
          - label: windows-x64
            platform: windows-latest
            target: ""
            args: ""
            asset-name: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target == ''

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target != ''
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: require mac signing secrets
        if: startsWith(matrix.label, 'macos-')
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing macOS signing/notarization secrets: ${missing[*]}"
            echo "Unsigned downloaded DMGs are rejected by Gatekeeper as damaged, so CI refuses to upload them."
            exit 1
          fi

      - name: import apple developer certificate
        if: startsWith(matrix.label, 'macos-')
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-ci-keychain-password}"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "No Developer ID Application signing identity was imported."
            echo "APPLE_CERTIFICATE_BASE64 must be a base64-encoded .p12 exported from Keychain Access with the private key, not a .cer file."
            echo "In Keychain Access, export from My Certificates after expanding Developer ID Application and confirming a private key appears underneath it."
            exit 1
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Anish Lakkapragada (W3JWJS9PHH)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: W3JWJS9PHH
        with:
          releaseId: ${{ needs.prepare-release.outputs.release-id }}
          args: ${{ matrix.args }}
          assetNamePattern: 'tubestack-v${{ needs.prepare-release.outputs.version }}-${{ matrix.asset-name }}.[ext]'
          includeUpdaterJson: false
